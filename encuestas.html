<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root{--cyan:#5DB4C9;--magenta:#F11D8C;--green:#199432;--ink:#080808;--text:#fff;--muted:#98a6aa;--line:rgba(255,255,255,.12);--card:rgba(255,255,255,.04);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Outfit',sans-serif;color:var(--text);background:var(--ink);min-height:100dvh;
    background-image:radial-gradient(80% 40% at 50% 0%,rgba(93,180,201,.08) 0%,rgba(8,8,8,0) 60%);
  }
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--line);}
  .topbar h1{font-family:'Bricolage Grotesque',sans-serif;font-size:1.2rem;font-weight:700;}
  .topbar a{color:var(--muted);font-size:.85rem;text-decoration:none;display:flex;align-items:center;gap:6px;}
  .topbar a:hover{color:var(--text);}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 24px 0;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;}
  .stat .val{font-family:'Bricolage Grotesque',sans-serif;font-size:2rem;font-weight:800;}
  .stat .lbl{font-size:.78rem;color:var(--muted);margin-top:4px;}
  .stat.cyan .val{color:var(--cyan);}
  .stat.magenta .val{color:var(--magenta);}
  .stat.green .val{color:var(--green);}
  .container{max-width:900px;margin:0 auto;padding:20px 24px 60px;}
  .section-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin:24px 0 10px;}
  .cards{display:flex;flex-direction:column;gap:12px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;flex-wrap:wrap;}
  .card-nombre{font-weight:700;font-size:1rem;}
  .card-fecha{font-size:.75rem;color:var(--muted);}
  .stars-disp{color:#f5c842;font-size:1.1rem;letter-spacing:1px;}
  .field-row{margin-bottom:10px;}
  .field-row .flabel{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px;}
  .field-row .fval{font-size:.9rem;line-height:1.55;color:var(--text);}
  .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.75rem;font-weight:600;background:rgba(93,180,201,.15);color:var(--cyan);border:1px solid rgba(93,180,201,.25);}
  .tag{display:inline-block;padding:3px 9px;border-radius:99px;font-size:.73rem;background:rgba(241,29,140,.1);color:var(--magenta);border:1px solid rgba(241,29,140,.2);margin:2px;}
  .divider{border:none;border-top:1px solid var(--line);margin:10px 0;}
  .empty{text-align:center;padding:40px 0;color:var(--muted);font-size:.95rem;}
  .loading{text-align:center;padding:40px 0;color:var(--muted);}
  .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .filter-btn{padding:6px 14px;border-radius:99px;border:1.5px solid var(--line);background:transparent;
    color:var(--muted);font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:.15s;}
  .filter-btn.active{border-color:var(--cyan);color:var(--text);background:rgba(93,180,201,.1);}
  @media(max-width:500px){.stats{grid-template-columns:1fr 1fr;}.container{padding:16px 16px 60px;}}
</style>
</head>

<div class="topbar">
  <h1>✨ Encuestas del viaje</h1>
  <a href="/#accesos" style="font-size:.83rem;font-weight:600;color:var(--muted);text-decoration:none;padding:6px 14px;border:1.5px solid var(--line);border-radius:99px;transition:.15s;">Panel →</a>
</div>

<div class="container">
  <div class="stats" id="statsBox">
    <div class="stat cyan"><div class="val" id="statTotal">—</div><div class="lbl">Respuestas</div></div>
    <div class="stat magenta"><div class="val" id="statAvg">—</div><div class="lbl">Promedio estrellas</div></div>
    <div class="stat green"><div class="val" id="statRec">—</div><div class="lbl">Lo recomendarían</div></div>
  </div>

  <p class="section-title" style="margin-top:24px;">Respuestas individuales</p>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-f="todas" type="button">Todas</button>

</div>

<script>
const SUPA_URL = "https://mzousqdahqterfawhwsz.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16b3VzcWRhaHF0ZXJmYXdod3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTc4MzUsImV4cCI6MjA5NjA5MzgzNX0.EdSlcRdLD75OdYlwtZGLVgL_PGpJysWb_MKvuwGgj5Y";
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

let allData = [];
let filtroActivo = 'todas';

function starsHtml(n) {
  return '★'.repeat(n || 0) + '☆'.repeat(5 - (n || 0));
}

function formatFecha(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'}) +
    ' ' + d.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
}

function renderCards(data) {
  const list = document.getElementById('cardsList');
  if (!data.length) { list.innerHTML = '<div class="empty">No hay respuestas con ese filtro.</div>'; return; }

  list.innerHTML = data.map(r => {
    const tags = r.lo_mejor ? r.lo_mejor.split(', ').map(t => `<span class="tag">${t}</span>`).join('') : '';
    return `
    <div class="card">
      <div class="card-head">
        <span class="card-nombre">${r.nombre || 'Anónimo'}</span>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="stars-disp">${starsHtml(r.estrellas)}</span>
          <span class="card-fecha">${formatFecha(r.created_at)}</span>
          <button type="button" onclick="deleteEncuesta('${r.id}')" style="padding:3px 9px;border-radius:7px;border:1.5px solid rgba(255,95,174,.3);background:transparent;color:#ff5fae;font-family:Outfit,sans-serif;font-size:.73rem;font-weight:600;cursor:pointer;">🗑️</button>
        </div>
      </div>
      ${r.recomendaria ? `<div class="field-row"><div class="flabel">¿Lo recomendaría?</div><div class="fval"><span class="badge">${r.recomendaria}</span></div></div>` : ''}
      ${r.lo_mejor ? `<div class="field-row"><div class="flabel">Lo mejor</div><div class="fval">${tags}</div></div>` : ''}
      ${r.feedback_libre ? `<hr class="divider"><div class="field-row"><div class="flabel">Comentario libre</div><div class="fval">${r.feedback_libre}</div></div>` : ''}
      ${r.momento_favorito ? `<div class="field-row"><div class="flabel">Momento favorito</div><div class="fval">${r.momento_favorito}</div></div>` : ''}
      ${r.mejoraria ? `<div class="field-row"><div class="flabel">Mejoraría</div><div class="fval">${r.mejoraria}</div></div>` : ''}
      ${r.para_quien_duda ? `<hr class="divider"><div class="field-row"><div class="flabel">Para quien duda en elegir Wake Up</div><div class="fval" style="font-style:italic;">"${r.para_quien_duda}"</div></div>` : ''}
    </div>`;
  }).join('');
}

function applyFilter() {
  let data = [...allData];
  if (filtroActivo === '5') data = data.filter(r => r.estrellas === 5);
  else if (filtroActivo === '4') data = data.filter(r => r.estrellas === 4);
  else if (filtroActivo === '1-3') data = data.filter(r => r.estrellas <= 3);
  else if (filtroActivo === 'con-comentario') data = data.filter(r => r.feedback_libre || r.para_quien_duda);
  renderCards(data);
}

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtroActivo = btn.dataset.f;
  applyFilter();
});

async function load() {
  const { data, error } = await supa.from('experiencias').select('*').order('created_at', { ascending: false });
  if (error || !data) { document.getElementById('cardsList').innerHTML = '<div class="empty">Error al cargar datos.</div>'; return; }

  allData = data;

  // Stats
  document.getElementById('statTotal').textContent = data.length;
  const withStars = data.filter(r => r.estrellas);
  const avg = withStars.length ? (withStars.reduce((a,r) => a + r.estrellas, 0) / withStars.length).toFixed(1) : '—';
  document.getElementById('statAvg').textContent = avg;
  const rec = data.filter(r => r.recomendaria && r.recomendaria.startsWith('sí')).length;
  const pct = data.length ? Math.round(rec / data.length * 100) + '%' : '—';
  document.getElementById('statRec').textContent = pct;

  applyFilter();
}

async function deleteEncuesta(id) {
  if(!confirm('¿Eliminar esta respuesta?')) return;
  const { error } = await supa.from('experiencias').delete().eq('id', id);
  if(error) { alert('Error al eliminar: ' + error.message); return; }
  load();
}

load();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(err => console.error('SW error:', err));
  });
}
</script>
</body>
