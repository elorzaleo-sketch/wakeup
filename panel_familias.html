<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Coordi · Familias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--cyan:#5DB4C9;--magenta:#F11D8C;--green:#199432;--ink:#080808;--text:#fff;--muted:#98a6aa;--line:rgba(255,255,255,.13);--card:rgba(255,255,255,.04);--card2:rgba(255,255,255,.07);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;color:var(--text);background:var(--ink);min-height:100dvh;
  background-image:radial-gradient(60% 40% at 50% 0%,rgba(93,180,201,.08) 0%,transparent 60%);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1);}
.topbar h1{font-family:'Bricolage Grotesque',sans-serif;font-size:1.15rem;font-weight:700;}
.topbar a{color:var(--muted);font-size:.83rem;text-decoration:none;}
.topbar a:hover{color:var(--text);}
.container{max-width:700px;margin:0 auto;padding:20px 20px 80px;}
/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:22px;background:rgba(255,255,255,.04);border-radius:12px;padding:5px;}
.tab{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;
  font-size:.85rem;font-weight:600;cursor:pointer;border-radius:9px;transition:.15s;}
.tab.active{background:var(--card2);color:var(--text);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
/* ── FORM ── */
.field{margin-bottom:14px;}
label{display:block;font-size:.8rem;font-weight:600;margin:0 0 5px;color:var(--muted);}
input[type=text],input[type=date],textarea,select{
  width:100%;font-family:'Outfit',sans-serif;font-size:.95rem;padding:12px 14px;
  border:1.5px solid var(--line);border-radius:11px;background:rgba(255,255,255,.04);color:var(--text);
  transition:border-color .15s;}
input::placeholder,textarea::placeholder{color:#5e6b6f;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(93,180,201,.15);}
textarea{resize:vertical;}
select option{background:#1a2224;}
/* ── EMOJI BAR ── */
.emoji-bar{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.emoji-btn{padding:5px 9px;border-radius:8px;border:1px solid var(--line);background:var(--card);
  cursor:pointer;font-size:1.1rem;transition:background .15s;}
.emoji-btn:hover{background:var(--card2);}
/* ── UPLOAD ── */
.upload-zone{border:2px dashed var(--line);border-radius:12px;padding:22px;text-align:center;cursor:pointer;
  position:relative;transition:border-color .2s,background .2s;}
.upload-zone:hover,.upload-zone.over{border-color:var(--cyan);background:rgba(93,180,201,.04);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone .uz-ico{font-size:1.8rem;margin-bottom:6px;}
.upload-zone p{font-size:.85rem;color:var(--muted);}
.upload-zone small{font-size:.75rem;color:#5e6b6f;}
.thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;}
.thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb video{width:100%;height:100%;object-fit:cover;}
.thumb .rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);border:none;color:#fff;
  width:20px;height:20px;border-radius:50%;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* ── PROGRESS ── */
.progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;margin:8px 0;overflow:hidden;}
.progress-fill{height:100%;background:var(--cyan);border-radius:99px;transition:width .3s;width:0%;}
/* ── BTN ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;cursor:pointer;
  font-family:'Outfit',sans-serif;font-weight:600;font-size:.97rem;padding:14px 20px;border-radius:12px;
  border:none;color:#fff;transition:transform .15s,box-shadow .2s;margin-top:6px;}
.btn-cyan{background:var(--cyan);box-shadow:0 10px 24px -8px rgba(93,180,201,.5);}
.btn-cyan:hover{transform:translateY(-1px);}
.btn-green{background:var(--green);box-shadow:0 10px 24px -8px rgba(25,148,50,.4);}
.btn-green:hover{transform:translateY(-1px);}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--muted);box-shadow:none;}
.btn-outline:hover{border-color:var(--cyan);color:var(--text);transform:none;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}
/* ── SECTION ── */
.section-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin:20px 0 10px;}
/* ── FICHAS TABLE ── */
.search-bar{position:relative;margin-bottom:12px;}
.search-bar input{padding-left:36px;}
.search-bar .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.95rem;}
.fichas-list{display:flex;flex-direction:column;gap:8px;}
.ficha-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;}
.ficha-row .fr-ico{font-size:1.2rem;flex:0 0 auto;}
.ficha-row .fr-txt{flex:1;min-width:0;}
.ficha-row .fr-nombre{font-weight:600;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ficha-row .fr-fecha{font-size:.74rem;color:var(--muted);margin-top:2px;}
.ficha-row a{color:var(--cyan);font-size:.8rem;font-weight:600;text-decoration:none;white-space:nowrap;}
.ficha-row a:hover{text-decoration:underline;}
/* ── RESUMENES LIST ── */
.resumen-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:8px;}
.resumen-item .ri-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.resumen-item .ri-fecha{font-weight:600;font-size:.92rem;}
.resumen-item .ri-btns{display:flex;gap:8px;}
.ri-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--line);background:transparent;
  color:var(--muted);font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;}
.ri-btn:hover{border-color:var(--cyan);color:var(--text);}
.resumen-item .ri-preview{font-size:.84rem;color:var(--muted);line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
/* ── ENCUESTAS ── */
.ef-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:10px;}
.ef-nombre{font-weight:700;font-size:.95rem;margin-bottom:10px;}
.ef-field{margin-bottom:8px;}
.ef-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px;}
.ef-val{font-size:.88rem;}
.stars-disp{color:#f5c842;}
/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1e2e31;border:1px solid rgba(93,180,201,.3);border-radius:12px;
  padding:10px 18px;font-size:.86rem;color:var(--text);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;z-index:99;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.error{color:#ff5fae;font-size:.82rem;margin:8px 0;}
@media(max-width:400px){.thumb-grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<div class="topbar">
  <h1>🗂️ Panel coordi · Familias</h1>
  <a href="/#accesos">← Volver</a>
</div>
<div class="container">

  <div class="tabs">
    <button class="tab active" type="button" onclick="switchTab('resumen')">📸 Resumen del día</button>
    <button class="tab" type="button" onclick="switchTab('fichas')">📋 Fichas médicas</button>
    <button class="tab" type="button" onclick="switchTab('encuestas')">💬 Encuestas</button>
  </div>

  <!-- ════ TAB: RESUMEN DEL DÍA ════ -->
  <div class="tab-panel active" id="tab-resumen">

    <p class="section-title">Crear / editar resumen</p>

    <div class="field">
      <label>Día del viaje</label>
      <select id="rdFecha">
        <option value="">— Seleccioná el día —</option>
        <option value="2026-08-15">Día 1 · Sábado 15 de agosto</option>
        <option value="2026-08-16">Día 2 · Domingo 16 de agosto</option>
        <option value="2026-08-17">Día 3 · Lunes 17 de agosto</option>
        <option value="2026-08-18">Día 4 · Martes 18 de agosto</option>
        <option value="2026-08-19">Día 5 · Miércoles 19 de agosto</option>
        <option value="2026-08-20">Día 6 · Jueves 20 de agosto</option>
        <option value="2026-08-21">Día 7 · Viernes 21 de agosto</option>
        <option value="2026-08-22">Día 8 · Sábado 22 de agosto</option>
      </select>
    </div>

    <div class="field">
      <label>Título del día (opcional)</label>
      <input type="text" id="rdTitulo" placeholder="Ej: ¡Primer día en la nieve! ❄️">
    </div>

    <div class="field">
      <label>Texto del resumen</label>
      <div class="emoji-bar" id="emojiBar">
        <button class="emoji-btn" type="button" data-e="❄️">❄️</button>
        <button class="emoji-btn" type="button" data-e="🏔️">🏔️</button>
        <button class="emoji-btn" type="button" data-e="⛷️">⛷️</button>
        <button class="emoji-btn" type="button" data-e="🎿">🎿</button>
        <button class="emoji-btn" type="button" data-e="🌟">🌟</button>
        <button class="emoji-btn" type="button" data-e="🎉">🎉</button>
        <button class="emoji-btn" type="button" data-e="❤️">❤️</button>
        <button class="emoji-btn" type="button" data-e="🔥">🔥</button>
        <button class="emoji-btn" type="button" data-e="😄">😄</button>
        <button class="emoji-btn" type="button" data-e="🤩">🤩</button>
        <button class="emoji-btn" type="button" data-e="🌨️">🌨️</button>
        <button class="emoji-btn" type="button" data-e="🎭">🎭</button>
      </div>
      <textarea id="rdTexto" rows="6" placeholder="Contá qué pasó hoy en el viaje…"></textarea>
    </div>

    <div class="field">
      <label>Fotos (máx. 10)</label>
      <div class="upload-zone" id="fotoZone">
        <input type="file" id="fotoFiles" accept="image/*" multiple capture="environment">
        <div class="uz-ico">📷</div>
        <p>Tocá para agregar fotos</p>
        <small>Hasta 10 fotos · JPG/PNG</small>
      </div>
      <div class="thumb-grid" id="fotoThumbs"></div>
    </div>

    <div class="field">
      <label>Videos (máx. 2)</label>
      <div class="upload-zone" id="videoZone">
        <input type="file" id="videoFiles" accept="video/*" multiple capture="environment">
        <div class="uz-ico">🎬</div>
        <p>Tocá para agregar videos</p>
        <small>Hasta 2 videos · MP4/MOV</small>
      </div>
      <div class="thumb-grid" id="videoThumbs"></div>
    </div>

    <div class="progress-bar" id="rdProgress" style="display:none;"><div class="progress-fill" id="rdFill"></div></div>
    <p class="error" id="rdError"></p>

    <button class="btn btn-cyan" id="btnPublicar" type="button">
      Publicar resumen 🚀
    </button>

    <p class="section-title" style="margin-top:28px;">Resúmenes publicados</p>
    <div id="resumenesPublicados"><div style="color:var(--muted);font-size:.88rem;text-align:center;padding:16px;">Cargando…</div></div>
  </div>

  <!-- ════ TAB: FICHAS MÉDICAS ════ -->
  <div class="tab-panel" id="tab-fichas">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <p class="section-title" style="margin:0;">Fichas recibidas</p>
      <button class="btn btn-outline" id="btnDescTodo" type="button" style="width:auto;padding:8px 16px;font-size:.82rem;">⬇️ Descargar todo (ZIP)</button>
    </div>
    <div class="search-bar">
      <span class="si">🔍</span>
      <input type="text" id="fichaSearch" placeholder="Buscar por nombre del pasajero…" oninput="filterFichas()">
    </div>
    <div id="fichasList"><div style="color:var(--muted);font-size:.88rem;text-align:center;padding:16px;">Cargando…</div></div>
  </div>

  <!-- ════ TAB: ENCUESTAS FAMILIAS ════ -->
  <div class="tab-panel" id="tab-encuestas">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <p class="section-title" style="margin:0;">Respuestas de familias</p>
      <span id="efCount" style="font-size:.8rem;color:var(--muted);"></span>
    </div>
    <div id="encuestasFamList"><div style="color:var(--muted);font-size:.88rem;text-align:center;padding:16px;">Cargando…</div></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL="https://mzousqdahqterfawhwsz.supabase.co", SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16b3VzcWRhaHFlcnRlZmF3aHdzeiIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzQ0ODM5NjkxLCJleHAiOjIwNjA0MTU2OTF9.RG-TNGwzp7YHr_fcrXtTQ1DMvOD_-4hP2_V71Y1au_I";
const supa=supabase.createClient(SUPA_URL,SUPA_KEY);

/* ── TABS ── */
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['resumen','fichas','encuestas'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='fichas') loadFichas();
  if(name==='encuestas') loadEncuestasFam();
}

/* ── TOAST ── */
let toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);}

/* ════════════════════════════════
   RESUMEN DEL DÍA
════════════════════════════════ */
let rdFotos=[],rdVideos=[];

// Emoji picker
document.getElementById('emojiBar').addEventListener('click',e=>{
  const btn=e.target.closest('.emoji-btn'); if(!btn) return;
  const ta=document.getElementById('rdTexto');
  const pos=ta.selectionStart;
  const v=ta.value;
  ta.value=v.slice(0,pos)+btn.dataset.e+v.slice(pos);
  ta.selectionStart=ta.selectionEnd=pos+btn.dataset.e.length;
  ta.focus();
});

// Foto upload
const fotoFiles=document.getElementById('fotoFiles');
fotoFiles.addEventListener('change',e=>addFotos(e.target.files));
document.getElementById('fotoZone').addEventListener('dragover',e=>{e.preventDefault();e.currentTarget.classList.add('over');});
document.getElementById('fotoZone').addEventListener('dragleave',e=>e.currentTarget.classList.remove('over'));
document.getElementById('fotoZone').addEventListener('drop',e=>{e.preventDefault();e.currentTarget.classList.remove('over');addFotos(e.dataTransfer.files);});

function addFotos(files){
  const imgs=Array.from(files).filter(f=>f.type.startsWith('image/'));
  rdFotos=[...rdFotos,...imgs].slice(0,10);
  renderThumbs('fotoThumbs',rdFotos,'foto');
}

// Video upload
const videoFiles=document.getElementById('videoFiles');
videoFiles.addEventListener('change',e=>addVideos(e.target.files));
document.getElementById('videoZone').addEventListener('dragover',e=>{e.preventDefault();e.currentTarget.classList.add('over');});
document.getElementById('videoZone').addEventListener('dragleave',e=>e.currentTarget.classList.remove('over'));
document.getElementById('videoZone').addEventListener('drop',e=>{e.preventDefault();e.currentTarget.classList.remove('over');addVideos(e.dataTransfer.files);});

function addVideos(files){
  const vids=Array.from(files).filter(f=>f.type.startsWith('video/'));
  rdVideos=[...rdVideos,...vids].slice(0,2);
  renderThumbs('videoThumbs',rdVideos,'video');
}

function renderThumbs(gridId,files,type){
  const grid=document.getElementById(gridId);
  grid.innerHTML='';
  files.forEach((f,i)=>{
    const url=URL.createObjectURL(f);
    const div=document.createElement('div'); div.className='thumb';
    div.innerHTML=type==='foto'
      ?`<img src="${url}" alt=""><button class="rm" onclick="removeFile('${type}',${i})">✕</button>`
      :`<video src="${url}" muted playsinline></video><button class="rm" onclick="removeFile('${type}',${i})">✕</button>`;
    grid.appendChild(div);
  });
}

function removeFile(type,i){
  if(type==='foto'){rdFotos.splice(i,1);renderThumbs('fotoThumbs',rdFotos,'foto');}
  else{rdVideos.splice(i,1);renderThumbs('videoThumbs',rdVideos,'video');}
}

// Publicar resumen
document.getElementById('btnPublicar').addEventListener('click',async()=>{
  const fecha=document.getElementById('rdFecha').value;
  const texto=document.getElementById('rdTexto').value.trim();
  const titulo=document.getElementById('rdTitulo').value.trim();
  const errEl=document.getElementById('rdError');
  errEl.textContent='';
  if(!fecha){errEl.textContent='Seleccioná el día.';return;}
  if(!texto&&!rdFotos.length){errEl.textContent='Escribí algo o subí al menos una foto.';return;}

  const btn=document.getElementById('btnPublicar');
  btn.disabled=true; btn.textContent='Publicando…';
  const prog=document.getElementById('rdProgress'); prog.style.display='block';
  const fill=document.getElementById('rdFill'); fill.style.width='10%';

  try{
    const fotoUrls=[], videoUrls=[];
    const total=rdFotos.length+rdVideos.length;
    let done=0;

    // Subir fotos
    for(const f of rdFotos){
      const name=`${fecha}/${Date.now()}_${f.name.replace(/\s/g,'_')}`;
      const {error}=await supa.storage.from('resumenes').upload(name,f,{contentType:f.type});
      if(error) throw error;
      const {data}=supa.storage.from('resumenes').getPublicUrl(name);
      fotoUrls.push(data.publicUrl);
      done++; fill.style.width=`${10+Math.round(done/total*70)}%`;
    }
    // Subir videos
    for(const v of rdVideos){
      const name=`${fecha}/vid_${Date.now()}_${v.name.replace(/\s/g,'_')}`;
      const {error}=await supa.storage.from('resumenes').upload(name,v,{contentType:v.type});
      if(error) throw error;
      const {data}=supa.storage.from('resumenes').getPublicUrl(name);
      videoUrls.push(data.publicUrl);
      done++; fill.style.width=`${10+Math.round(done/total*70)}%`;
    }

    fill.style.width='85%';

    // Upsert en tabla
    const payload={fecha,titulo:titulo||null,texto:texto||null,fotos:fotoUrls,videos:videoUrls,updated_at:new Date().toISOString()};
    const {error:dbErr}=await supa.from('resumenes_dia').upsert(payload,{onConflict:'fecha'});
    if(dbErr) throw dbErr;

    fill.style.width='100%';
    showToast('¡Resumen publicado! Las familias ya pueden verlo ✓');

    // Reset form
    document.getElementById('rdFecha').value='';
    document.getElementById('rdTitulo').value='';
    document.getElementById('rdTexto').value='';
    rdFotos=[]; rdVideos=[];
    document.getElementById('fotoThumbs').innerHTML='';
    document.getElementById('videoThumbs').innerHTML='';
    btn.disabled=false; btn.textContent='Publicar resumen 🚀';
    setTimeout(()=>{prog.style.display='none';fill.style.width='0%';},1000);
    loadResumenesPublicados();

  }catch(e){
    console.error(e);
    errEl.textContent='Error al publicar: '+e.message;
    btn.disabled=false; btn.textContent='Publicar resumen 🚀';
    prog.style.display='none';
  }
});

async function loadResumenesPublicados(){
  const el=document.getElementById('resumenesPublicados');
  const {data}=await supa.from('resumenes_dia').select('*').order('fecha',{ascending:false});
  if(!data||!data.length){el.innerHTML='<div style="color:var(--muted);font-size:.86rem;text-align:center;padding:12px;">Aún no hay resúmenes publicados.</div>';return;}
  el.innerHTML=data.map(r=>`
    <div class="resumen-item">
      <div class="ri-head">
        <span class="ri-fecha">${r.fecha}</span>
        <div class="ri-btns">
          <button class="ri-btn" type="button" onclick="editResumen('${r.fecha}')">✏️ Editar</button>
          <button class="ri-btn" type="button" onclick="deleteResumen('${r.id}','${r.fecha}')" style="color:#ff5fae;">🗑️</button>
        </div>
      </div>
      <div class="ri-preview">${r.texto||'(sin texto)'}</div>
      <div style="font-size:.74rem;color:var(--muted);margin-top:5px;">${r.fotos?.length||0} fotos · ${r.videos?.length||0} videos</div>
    </div>`).join('');
}

function editResumen(fecha){
  document.getElementById('rdFecha').value=fecha;
  // Cargar datos
  supa.from('resumenes_dia').select('*').eq('fecha',fecha).single().then(r=>{
    if(r.data){
      document.getElementById('rdTitulo').value=r.data.titulo||'';
      document.getElementById('rdTexto').value=r.data.texto||'';
      showToast('Editando el resumen del '+fecha+'. Publicá para guardar los cambios.');
      window.scrollTo(0,0);
    }
  });
}

async function deleteResumen(id,fecha){
  if(!confirm(`¿Eliminar el resumen del ${fecha}?`)) return;
  await supa.from('resumenes_dia').delete().eq('id',id);
  showToast('Resumen eliminado');
  loadResumenesPublicados();
}

loadResumenesPublicados();

/* ════════════════════════════════
   FICHAS MÉDICAS
════════════════════════════════ */
let allFichas=[];

async function loadFichas(){
  const {data}=await supa.from('fichas_salud').select('*').order('created_at',{ascending:false});
  allFichas=data||[];
  filterFichas();
}

function filterFichas(){
  const q=document.getElementById('fichaSearch').value.toLowerCase();
  const filtered=allFichas.filter(f=>f.nombre_pasajero.toLowerCase().includes(q));
  const el=document.getElementById('fichasList');
  if(!filtered.length){el.innerHTML='<div style="color:var(--muted);font-size:.88rem;text-align:center;padding:20px;">No se encontraron fichas.</div>';return;}
  el.innerHTML=filtered.map(f=>{
    const fecha=new Date(f.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    return `<div class="ficha-row">
      <span class="fr-ico">📋</span>
      <span class="fr-txt">
        <span class="fr-nombre">${f.nombre_pasajero}</span>
        <span class="fr-fecha">${fecha}</span>
      </span>
      <a href="${f.url_pdf}" target="_blank" rel="noopener">⬇️ Ver PDF</a>
    </div>`;
  }).join('');
}

// Descargar todo — abre cada PDF en tab (descarga masiva en browser requiere extensión)
document.getElementById('btnDescTodo').addEventListener('click',()=>{
  if(!allFichas.length){showToast('No hay fichas aún.');return;}
  allFichas.forEach((f,i)=>{
    setTimeout(()=>window.open(f.url_pdf,'_blank'),i*400);
  });
  showToast(`Abriendo ${allFichas.length} fichas en nuevas pestañas…`);
});

/* ════════════════════════════════
   ENCUESTAS FAMILIAS
════════════════════════════════ */
async function loadEncuestasFam(){
  const {data}=await supa.from('encuestas_familias').select('*').order('created_at',{ascending:false});
  const el=document.getElementById('encuestasFamList');
  document.getElementById('efCount').textContent=data?.length?`${data.length} respuesta${data.length!==1?'s':''}`:'';
  if(!data||!data.length){el.innerHTML='<div style="color:var(--muted);font-size:.88rem;text-align:center;padding:20px;">Aún no hay encuestas.</div>';return;}
  el.innerHTML=data.map(r=>{
    const stars=n=>n?'★'.repeat(n)+'☆'.repeat(5-n):'-';
    return `<div class="ef-card">
      <div class="ef-nombre">${r.nombre||'Anónimo'}</div>
      ${r.como_se_entero?`<div class="ef-field"><div class="ef-label">Cómo se enteró</div><div class="ef-val">${r.como_se_entero}</div></div>`:''}
      ${r.estrellas_comunicacion?`<div class="ef-field"><div class="ef-label">Comunicación</div><div class="ef-val stars-disp">${stars(r.estrellas_comunicacion)}</div></div>`:''}
      ${r.estrellas_organizacion?`<div class="ef-field"><div class="ef-label">Organización</div><div class="ef-val stars-disp">${stars(r.estrellas_organizacion)}</div></div>`:''}
      ${r.contento?`<div class="ef-field"><div class="ef-label">¿Volvió contento?</div><div class="ef-val">${r.contento}</div></div>`:''}
      ${r.recomendaria?`<div class="ef-field"><div class="ef-label">¿Recomendaría?</div><div class="ef-val">${r.recomendaria}</div></div>`:''}
      ${r.comentario?`<div class="ef-field"><div class="ef-label">Comentario</div><div class="ef-val">${r.comentario}</div></div>`:''}
      ${r.recomendacion?`<div class="ef-field"><div class="ef-label">Qué le diría a otras familias</div><div class="ef-val" style="font-style:italic;">"${r.recomendacion}"</div></div>`:''}
    </div>`;
  }).join('');
}
</script>
