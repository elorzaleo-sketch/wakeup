<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma · Wake Up Bariloche 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--cyan:#5DB4C9;--magenta:#F11D8C;--green:#199432;--ink:#080808;--text:#fff;--muted:#98a6aa;--line:rgba(255,255,255,.12);--card:rgba(255,255,255,.04);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;color:var(--text);background:var(--ink);min-height:100dvh;
  background-image:radial-gradient(70% 40% at 50% 0%,rgba(93,180,201,.09) 0%,transparent 60%);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);}
.topbar a{color:var(--muted);font-size:.83rem;text-decoration:none;}
.container{max-width:520px;margin:0 auto;padding:16px 20px 60px;}
.toggle-bar{display:flex;gap:6px;background:rgba(255,255,255,.05);border-radius:12px;padding:4px;margin-bottom:20px;}
.toggle-btn{flex:1;padding:8px;border:none;border-radius:9px;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:.15s;}
.toggle-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.day-card{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:10px;overflow:hidden;}
.day-card.hoy{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(93,180,201,.25);}
.day-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.day-head .dn{font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;}
.day-head .df{font-size:.78rem;color:var(--muted);margin-top:2px;}
.hoy-badge{background:var(--cyan);color:#000;font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:99px;}
.chev{color:var(--muted);font-size:.9rem;transition:transform .25s;}
.day-head.open .chev{transform:rotate(180deg);}
.day-body{display:none;border-top:1px solid var(--line);padding:14px 16px;}
.day-body.open{display:block;}
.turno{display:flex;gap:12px;margin-bottom:12px;}
.turno:last-child{margin-bottom:0;}
.turno-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);width:52px;flex:0 0 auto;padding-top:3px;}
.turno-acts{flex:1;display:flex;flex-direction:column;gap:5px;}
.act-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border-radius:9px;padding:8px 10px;}
.act-emoji{font-size:.95rem;flex:0 0 auto;}
.act-info{flex:1;min-width:0;}
.act-name{font-size:.87rem;line-height:1.3;}
.act-hora{font-size:.73rem;color:var(--muted);margin-top:2px;}
.empty-act{font-size:.82rem;color:var(--muted);font-style:italic;padding:2px 0;}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:.95rem;}
.fuera-rango{text-align:center;padding:40px 0;color:var(--muted);}
.fuera-rango .ei{font-size:2.5rem;margin-bottom:12px;}
</style>
</head>
<body>
<div class="topbar">
  <span style="font-size:1rem;font-weight:700;">🗓️ Cronograma del viaje</span>
  <a href="javascript:history.back()">← Volver</a>
</div>
<div class="container">
  <div class="toggle-bar">
    <button class="toggle-btn active" id="btnHoy" type="button" onclick="setVista('hoy')">📍 Hoy</button>
    <button class="toggle-btn" id="btnTodo" type="button" onclick="setVista('todo')">📅 Todo el viaje</button>
  </div>
  <div id="cronoContent"><div class="loading">Cargando cronograma…</div></div>
</div>

<script>
const sb = supabase.createClient('https://mzousqdahqterfawhwsz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16b3VzcWRhaHF0ZXJmYXdod3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTc4MzUsImV4cCI6MjA5NjA5MzgzNX0.EdSlcRdLD75OdYlwtZGLVgL_PGpJysWb_MKvuwGgj5Y');

const ACTIVITIES = [
  {id:1,name:"Circuito Chico, Punto Panorámico",emoji:"🚌"},{id:2,name:"Adventure City Tour",emoji:"🏙️"},
  {id:3,name:"Ski",emoji:"🏂"},{id:4,name:"Piedras Blancas De Día",emoji:"❄️"},
  {id:5,name:"Adventure Day (Tom Wesley)",emoji:"🎒"},{id:6,name:"Canopy",emoji:"🌲"},
  {id:7,name:"Extremos Encantado",emoji:"🧗"},{id:8,name:"Trekking",emoji:"🥾"},
  {id:9,name:"Chocolatería",emoji:"🍫"},{id:10,name:"Aventura en el cerro",emoji:"🛵"},
  {id:11,name:"Noche Fluo en pileta",emoji:"🏊"},{id:12,name:"Fiesta Wake Up",emoji:"🎉"},
  {id:13,name:"Fourtrack",emoji:"🏎️"},{id:14,name:"Sala de Escape",emoji:"🔒"},
  {id:15,name:"Noche Bowling",emoji:"🎳"},{id:16,name:"Cena de Gala",emoji:"🍽️"},
  {id:17,name:"Piedras Blancas De Noche",emoji:"🌜"},{id:18,name:"Centro libre / compras",emoji:"🛍️"},
  {id:19,name:"Llegada al hotel",emoji:"🏨"},{id:20,name:"Salida del hotel",emoji:"🏨"},
];
const ACT = Object.fromEntries(ACTIVITIES.map(a=>[a.id,a]));

const DIAS = [
  {n:15,label:'Día 1',desc:'Sábado 15 de agosto',fecha:'2026-08-15'},
  {n:16,label:'Día 2',desc:'Domingo 16 de agosto',fecha:'2026-08-16'},
  {n:17,label:'Día 3',desc:'Lunes 17 de agosto',fecha:'2026-08-17'},
  {n:18,label:'Día 4',desc:'Martes 18 de agosto',fecha:'2026-08-18'},
  {n:19,label:'Día 5',desc:'Miércoles 19 de agosto',fecha:'2026-08-19'},
  {n:20,label:'Día 6',desc:'Jueves 20 de agosto',fecha:'2026-08-20'},
  {n:21,label:'Día 7',desc:'Viernes 21 de agosto',fecha:'2026-08-21'},
  {n:22,label:'Día 8',desc:'Sábado 22 de agosto',fecha:'2026-08-22'},
];
const TURNOS = [{key:'manana',label:'Mañana'},{key:'tarde',label:'Tarde'},{key:'noche',label:'Noche'}];

let cronoData = {};
let vista = 'hoy';

function diaHoy(){
  const today = new Date().toISOString().slice(0,10);
  return DIAS.find(d => d.fecha === today) || null;
}

function setVista(v){
  vista = v;
  document.getElementById('btnHoy').classList.toggle('active', v==='hoy');
  document.getElementById('btnTodo').classList.toggle('active', v==='todo');
  render();
}

function actHTML(slots){
  if(!slots || !slots.length) return '<div class="empty-act">Sin actividad cargada</div>';
  const filled = slots.filter(s => s.act);
  if(!filled.length) return '<div class="empty-act">Sin actividad cargada</div>';
  return filled.map(s => {
    const a = ACT[s.act];
    if(!a) return '';
    const partes = [];
    if(s.salida) partes.push('Salida ' + s.salida);
    if(s.llegada) partes.push('Regreso ' + s.llegada);
    const horaStr = partes.length ? `<div class="act-hora">${partes.join(' · ')}</div>` : '';
    return `<div class="act-item">
      <span class="act-emoji">${a.emoji}</span>
      <div class="act-info"><div class="act-name">${a.name}</div>${horaStr}</div>
    </div>`;
  }).join('');
}

function dayCardHTML(dia, isHoy, defaultOpen){
  const d = cronoData[dia.n] || {};
  return `
    <div class="day-card ${isHoy ? 'hoy' : ''}">
      <div class="day-head ${defaultOpen ? 'open' : ''}" onclick="toggleDay(this)">
        <div>
          <div class="dn">${dia.label} <span style="font-weight:400;font-size:.85rem;color:var(--muted);">· ${dia.desc}</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${isHoy ? '<span class="hoy-badge">HOY</span>' : ''}
          <span class="chev">▼</span>
        </div>
      </div>
      <div class="day-body ${defaultOpen ? 'open' : ''}">
        ${TURNOS.map(t => `
          <div class="turno">
            <div class="turno-label">${t.label}</div>
            <div class="turno-acts">${actHTML(d[t.key])}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function toggleDay(head){
  head.classList.toggle('open');
  head.nextElementSibling.classList.toggle('open');
}

function render(){
  const hoy = diaHoy();
  const el = document.getElementById('cronoContent');

  if(vista === 'hoy'){
    if(!hoy){
      const esBefore = new Date() < new Date('2026-08-15');
      el.innerHTML = `<div class="fuera-rango">
        <div class="ei">${esBefore ? '🏔️' : '✈️'}</div>
        <p>${esBefore ? 'El viaje empieza el 15 de agosto. ¡Ya falta poco!' : 'El viaje ya terminó. ¡Gracias por viajar con Wake Up!'}</p>
        <button onclick="setVista('todo')" type="button" style="margin-top:16px;padding:10px 20px;border-radius:10px;border:1.5px solid var(--line);background:transparent;color:var(--muted);font-family:Outfit,sans-serif;font-size:.88rem;cursor:pointer;">Ver cronograma completo</button>
      </div>`;
      return;
    }
    el.innerHTML = dayCardHTML(hoy, true, true);
  } else {
    el.innerHTML = DIAS.map(d => dayCardHTML(d, d.fecha===(hoy?.fecha||''), d.fecha===(hoy?.fecha||''))).join('');
  }
}

async function load(){
  try{
    const {data, error} = await sb.from('cronograma').select('data').eq('id','general').single();
    if(error) throw error;
    if(data?.data?.data) cronoData = data.data.data;
  } catch(e){
    console.error('Error cargando cronograma:', e);
    document.getElementById('cronoContent').innerHTML = '<div class="loading">No se pudo cargar el cronograma.</div>';
    return;
  }
  render();
}

load();
</script>
</body>
</html>
