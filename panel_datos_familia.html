<style>
:root{--cyan:#5DB4C9;--magenta:#F11D8C;--green:#199432;--ink:#080808;--text:#fff;--muted:#98a6aa;--line:rgba(255,255,255,.13);--card:rgba(255,255,255,.04);--card2:rgba(255,255,255,.07);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;color:var(--text);background:var(--ink);min-height:100dvh;
  background-image:radial-gradient(60% 40% at 50% 0%,rgba(93,180,201,.08) 0%,transparent 60%);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1);}
.topbar h1{font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;font-weight:700;}
.topbar a{color:var(--muted);font-size:.83rem;text-decoration:none;padding:6px 14px;border:1.5px solid var(--line);border-radius:99px;transition:.15s;}
.topbar a:hover{color:var(--text);border-color:var(--cyan);}
.topbar-actions{display:flex;align-items:center;gap:8px;}
.edit-toggle{font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:600;padding:6px 14px;border-radius:99px;border:1.5px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;transition:.15s;}
.edit-toggle:hover{color:var(--text);border-color:var(--cyan);}
.edit-toggle.active{color:var(--ink);background:var(--cyan);border-color:var(--cyan);}
.container{max-width:760px;margin:0 auto;padding:20px 20px 80px;}
.search-bar{position:relative;margin-bottom:16px;}
.search-bar input{width:100%;font-family:'Outfit',sans-serif;font-size:.95rem;padding:12px 14px 12px 36px;border:1.5px solid var(--line);border-radius:11px;background:rgba(255,255,255,.04);color:var(--text);}
.search-bar input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(93,180,201,.15);}
.search-bar .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);}
.stats{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.stats-sub{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;}
.stat .val{font-family:'Bricolage Grotesque',sans-serif;font-size:2rem;font-weight:800;color:var(--cyan);}
.stat .lbl{font-size:.78rem;color:var(--muted);margin-top:4px;}
.stat.mini{padding:12px 8px;}
.stat.mini .val{font-size:1.4rem;}
.stat.mini .lbl{font-size:.68rem;}
@media(max-width:420px){.stats-sub{gap:6px;}.stat.mini{padding:10px 4px;}.stat.mini .val{font-size:1.15rem;}.stat.mini .lbl{font-size:.6rem;}}
.ef-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:12px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.card-nombre{font-weight:700;font-size:1rem;}
.card-fecha{font-size:.75rem;color:var(--muted);}
.ef-field{margin-bottom:9px;}
.ef-field:last-child{margin-bottom:0;}
.ef-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px;}
.ef-val{font-size:.9rem;line-height:1.55;white-space:pre-wrap;}
.ef-val.empty{color:#5e6b6f;font-style:italic;}
.divider{border:none;border-top:1px solid var(--line);margin:12px 0;}
.card-actions{display:flex;justify-content:flex-end;margin-top:10px;}
.del-btn{padding:5px 12px;border-radius:8px;border:1.5px solid rgba(255,95,174,.3);background:transparent;color:#ff5fae;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:.15s;}
.del-btn:hover{border-color:#ff5fae;background:rgba(255,95,174,.08);}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e2e31;border:1px solid rgba(93,180,201,.3);border-radius:12px;padding:10px 18px;font-size:.86rem;color:var(--text);transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;z-index:99;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.empty-state{color:var(--muted);font-size:.88rem;text-align:center;padding:30px 10px;}
.ef-input{width:100%;font-family:'Outfit',sans-serif;font-size:.9rem;line-height:1.5;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:rgba(255,255,255,.05);color:var(--text);resize:vertical;}
.ef-input:focus{outline:none;border-color:var(--cyan);}
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
.pw-overlay.show{display:flex;}
.pw-box{background:#12181a;border:1px solid var(--line);border-radius:16px;padding:24px;max-width:320px;width:100%;}
.pw-box h3{font-family:'Bricolage Grotesque',sans-serif;font-size:1.05rem;margin-bottom:6px;}
.pw-box p{font-size:.85rem;color:var(--muted);margin-bottom:14px;}
.pw-box input{width:100%;font-family:'Outfit',sans-serif;font-size:.95rem;padding:11px 14px;border:1.5px solid var(--line);border-radius:11px;background:rgba(255,255,255,.04);color:var(--text);margin-bottom:8px;box-sizing:border-box;}
.pw-box input:focus{outline:none;border-color:var(--cyan);}
.pw-error{color:#ff5fae;font-size:.8rem;min-height:16px;margin-bottom:4px;}
.pw-actions{display:flex;gap:8px;margin-top:6px;}
.pw-actions button{flex:1;padding:10px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:.15s;}
.pw-cancel{background:transparent;border:1.5px solid var(--line);color:var(--muted);}
.pw-cancel:hover{color:var(--text);}
.pw-confirm{background:var(--cyan);border:1.5px solid var(--cyan);color:var(--ink);}
.pw-confirm:hover{opacity:.88;}
</style>
</head>

<div class="topbar">
  <h1>🩺 Datos de familias</h1>

    </div>
  </div>
</div>

    editMode = false;
    editToggle.textContent = '✏️ Editar';
    editToggle.classList.remove('active');
    filtrar();
  } else {
    abrirModalPw();
  }
});
pwCancel.addEventListener('click', cerrarModalPw);
pwConfirm.addEventListener('click', intentarDesbloquear);
pwInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') intentarDesbloquear(); });
pwOverlay.addEventListener('click', (e)=>{ if(e.target === pwOverlay) cerrarModalPw(); });

function actualizarStats(){
  document.getElementById('statTotal').textContent = registros.length;
  document.getElementById('statMedicas').textContent = registros.filter(r => (r.observaciones_medicas||'').trim()).length;
  document.getElementById('statDieta').textContent = registros.filter(r => (r.dieta_alimenticia||'').trim()).length;
  document.getElementById('statObs').textContent = registros.filter(r => (r.observaciones||'').trim()).length;
}

async function guardarCampo(el){
  const id = el.dataset.id;
  const campoKey = el.dataset.campo;
  const valor = el.value.trim();
  const reg = registros.find(r => r.id === id);
  if(reg && (reg[campoKey]||'').trim() === valor) return;
  const { error } = await supa.from('datos_familia').update({ [campoKey]: valor }).eq('id', id);
  if(error){ console.error(error); showToast('No se pudo guardar el cambio.'); return; }
  if(reg) reg[campoKey] = valor;
  actualizarStats();
  showToast('Cambio guardado.');
}

async function cargar(){
  const { data, error } = await supa.from('datos_familia').select('*').order('created_at', { ascending:false });
  if(error){ console.error(error); document.getElementById('lista').innerHTML = '<div class="empty-state">Hubo un error al cargar los datos.</div>'; return; }
  registros = data || [];
  actualizarStats();
  filtrar();
}

function campo(label, valor, campoKey, id){
  const val = (valor||'').trim();
  if(editMode){
    return `<div class="ef-field"><div class="ef-label">${label}</div><textarea class="ef-input" rows="2" data-id="${id}" data-campo="${campoKey}" onblur="guardarCampo(this)">${escHTML(val)}</textarea></div>`;
  }
  if(!val) return `<div class="ef-field"><div class="ef-label">${label}</div><div class="ef-val empty">Sin especificar</div></div>`;
  return `<div class="ef-field"><div class="ef-label">${label}</div><div class="ef-val">${escHTML(val)}</div></div>`;
}

const COLEGIOS = ['Berazategui','El Encuentro','Emanuel','Hay Vida En Jesús','M.T Alvear','Menoyo','Zion'];

function campoColegio(valor, id){
  const val = (valor||'').trim();
  if(editMode){
    const opts = COLEGIOS.map(c => `<option value="${escHTML(c)}"${c===val?' selected':''}>${escHTML(c)}</option>`).join('');
    return `<div class="ef-field"><div class="ef-label">Colegio</div><select class="ef-input" data-id="${id}" data-campo="colegio" onchange="guardarCampo(this)"><option value=""${!val?' selected':''} disabled>Seleccionar…</option>${opts}</select></div>`;
  }
  if(!val) return `<div class="ef-field"><div class="ef-label">Colegio</div><div class="ef-val empty">Sin especificar</div></div>`;
  return `<div class="ef-field"><div class="ef-label">Colegio</div><div class="ef-val">${escHTML(val)}</div></div>`;
}

function filtrar(){
  const q = document.getElementById('buscador').value.toLowerCase().trim();
  const filtrados = registros.filter(r => (r.nombre_pasajero||'').toLowerCase().includes(q) || (r.colegio||'').toLowerCase().includes(q));
  const el = document.getElementById('lista');
  if(!filtrados.length){
    el.innerHTML = '<div class="empty-state">No se encontraron registros.</div>';
    return;
  }
  el.innerHTML = filtrados.map(r=>{
    const fecha = r.created_at ? new Date(r.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="ef-card">
      <div class="card-head">
        <span class="card-nombre">${escHTML(r.nombre_pasajero)}</span>
        <span class="card-fecha">${fecha}</span>
      </div>
      ${campoColegio(r.colegio, r.id)}
      ${campo('Observaciones médicas', r.observaciones_medicas, 'observaciones_medicas', r.id)}
      ${campo('Dietas alimenticias', r.dieta_alimenticia, 'dieta_alimenticia', r.id)}
      ${campo('Observaciones', r.observaciones, 'observaciones', r.id)}
      <div class="card-actions">
        <button class="del-btn" type="button" onclick="borrar('${r.id}')">🗑️ Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

async function borrar(id){
  if(!confirm('¿Eliminar este registro? Esta acción no se puede deshacer.')) return;
  const { error } = await supa.from('datos_familia').delete().eq('id', id);
  if(error){ console.error(error); showToast('No se pudo eliminar.'); return; }
  registros = registros.filter(r => r.id !== id);
  actualizarStats();
  filtrar();
  showToast('Registro eliminado.');
}

cargar();
</script>
</body>
</html>
